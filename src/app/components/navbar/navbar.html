<nav class="vp-premium-navbar" [class.navbar-transparent]="transparent()">
  <div class="vp-container">
    <div class="nav-content">
      
      <!-- LOGO -->
      <a routerLink="/" class="nav-logo">
        <img src="/assets/datafyra-logo.jpg" alt="Datafyra Logo" style="width: 36px; border-radius: 10px; box-shadow: 0 4px 10px rgba(124, 58, 237, 0.25); transition: transform 0.3s ease;">
        <span class="logo-text">Datafyra</span>
      </a>

      <!-- ENLACES -->
      <div class="nav-links" style="display: none;">
        <!-- Si necesitas que aparezcan en pantallas grandes, puedes añadir un media query en CSS -->
      </div>

      <!-- ACCIONES -->
      <div class="nav-actions">
        @if (!isOverlayOpen()) {
          @if (auth.isLoggedIn()) {
            <div class="user-menu-premium">
              <a routerLink="/dashboard" class="nav-login-link" style="font-weight: 700;">Ir al Panel</a>
              <button (click)="logout()" class="nav-logout-btn" title="Cerrar sesión">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
              </button>
            </div>
          } @else {
            <a [routerLink]="hijackAuth() ? null : '/auth'" (click)="triggerAuth(true, $event)" class="nav-login-link" style="cursor:pointer;">Iniciar sesión</a>
            <app-wavy-button 
              [routerLink]="hijackAuth() ? null : '/auth'" 
              (click)="triggerAuth(false, $event)" 
              className="nav-cta" 
              variant="default" 
              text="Comenzar Gratis">
            </app-wavy-button>
          }
        }
      </div>

    </div>
  </div>
</nav>
