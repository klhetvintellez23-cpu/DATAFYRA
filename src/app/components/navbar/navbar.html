<nav class="fixed w-full bg-white/80 backdrop-blur-md z-50 border-b border-gray-100 transition-all duration-300" id="navbar" [class.bg-transparent]="transparent()" [class.border-transparent]="transparent()">
  <div class="max-w-[90rem] mx-auto px-6 sm:px-8 lg:px-12">
      <div class="flex justify-between items-center h-20">
          <!-- Logo -->
          <a routerLink="/" class="flex items-center gap-4">
              <div class="w-12 h-12 bg-[#7F00FF] rounded-xl flex items-center justify-center text-white font-bold text-2xl shadow-lg shadow-purple-200">
                  D
              </div>
              <span class="font-bold text-3xl tracking-tight text-[#1d1b20]">Datafyra</span>
          </a>
          
          <!-- Desktop Menu -->
          <div class="hidden md:flex items-center space-x-10">
              <a routerLink="/tour" class="text-[#625b71] hover:text-[#1d1b20] text-base font-medium transition-colors">Tour</a>
              <a href="#" class="text-[#625b71] hover:text-[#1d1b20] text-base font-medium transition-colors">Soluciones</a>
              <a href="#" class="text-[#625b71] hover:text-[#1d1b20] text-base font-medium transition-colors">Plantillas</a>
          </div>

          <!-- Acciones -->
          <div class="flex items-center gap-8">
              @if (!isOverlayOpen()) {
                  @if (auth.isLoggedIn()) {
                      <a routerLink="/dashboard" class="text-[#1d1b20] font-bold hover:text-[#7F00FF] transition-colors text-lg">Ir al Panel</a>
                      <button (click)="logout()" class="text-gray-500 hover:text-red-500 transition-colors" title="Cerrar sesión">
                          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                              <polyline points="16 17 21 12 16 7"></polyline>
                              <line x1="21" y1="12" x2="9" y2="12"></line>
                          </svg>
                      </button>
                  } @else {
                      <div class="flex items-center gap-6">
                        <app-wavy-button 
                          (click)="triggerAuth(false, $event)"
                          className="px-8 py-3.5 editorial-gradient text-white font-bold rounded-full shadow-lg hover:shadow-primary/30 transition-all text-base" 
                          text="Crear cuenta">
                        </app-wavy-button>
                        <a 
                          (click)="triggerAuth(true, $event)"
                          class="text-[#1d1b20] font-bold hover:text-[#7F00FF] transition-colors text-base cursor-pointer">
                          Acceder
                        </a>
                      </div>
                  }
              }
          </div>
      </div>
  </div>
</nav>
